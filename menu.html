<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我们的菜单</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: #f5f5f5;
    height: 100vh; overflow: hidden;
  }

  /* 顶部栏 */
  .topbar {
    background: #fff; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #eee;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar h1 { font-size: 17px; font-weight: 600; color: #333; }
  .cart-btn {
    position: relative; background: #ff6600; color: #fff; border: none;
    border-radius: 16px; padding: 6px 14px; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .cart-btn .badge {
    background: #fff; color: #ff6600; border-radius: 50%;
    min-width: 18px; height: 18px; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold;
  }

  /* 主体两栏 */
  .main { display: flex; height: calc(100vh - 50px); }

  /* 左侧分类 */
  .sidebar {
    width: 90px; background: #f8f8f8; overflow-y: auto;
    flex-shrink: 0; padding: 4px 0;
  }
  .sidebar .cat {
    padding: 14px 8px; text-align: center; font-size: 13px; color: #666;
    cursor: pointer; position: relative; line-height: 1.3;
  }
  .sidebar .cat.active {
    background: #fff; color: #ff6600; font-weight: 600;
  }
  .sidebar .cat.active::before {
    content: ''; position: absolute; left: 0; top: 10%; height: 80%;
    width: 3px; background: #ff6600; border-radius: 0 2px 2px 0;
  }

  /* 右侧菜品 */
  .content { flex: 1; overflow-y: auto; background: #fff; }

  .section-title {
    padding: 12px 14px 6px; font-size: 14px; color: #999;
    position: sticky; top: 0; background: #fff; z-index: 2;
    border-bottom: 1px solid #f0f0f0;
  }

  .dish-item {
    display: flex; align-items: center; padding: 12px 14px;
    border-bottom: 1px solid #f5f5f5; cursor: pointer;
    transition: background 0.15s;
  }
  .dish-item:active { background: #fafafa; }
  .dish-item.selected { background: #fff8f5; }

  .dish-img {
    width: 56px; height: 56px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; flex-shrink: 0; margin-right: 10px;
  }

  .dish-info { flex: 1; min-width: 0; }
  .dish-info .name { font-size: 15px; color: #333; font-weight: 500; }
  .dish-info .desc { font-size: 12px; color: #999; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dish-info .tags { margin-top: 4px; display: flex; gap: 4px; }
  .dish-info .tag {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: #fff3e0; color: #ff6600;
  }

  .dish-action {
    flex-shrink: 0; margin-left: 8px;
  }
  .btn-add {
    width: 24px; height: 24px; border-radius: 50%;
    background: #ff6600; color: #fff; border: none;
    font-size: 16px; line-height: 24px; text-align: center;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .btn-add.added {
    background: #fff; color: #ff6600; border: 1.5px solid #ff6600;
  }
  .btn-add .count-num { font-size: 12px; }

  /* 购物车弹窗 */
  .cart-mask {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 100; flex-direction: column; justify-content: flex-end;
  }
  .cart-mask.show { display: flex; }
  .cart-panel {
    background: #fff; border-radius: 16px 16px 0 0; max-height: 55vh;
    display: flex; flex-direction: column; animation: up 0.25s ease;
  }
  @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .cart-header {
    padding: 14px 16px; display: flex; justify-content: space-between;
    align-items: center; border-bottom: 1px solid #f0f0f0;
  }
  .cart-header h3 { font-size: 16px; }
  .cart-header .clear-btn { font-size: 13px; color: #999; background: none; border: none; cursor: pointer; }

  .cart-list { flex: 1; overflow-y: auto; padding: 0 16px; }
  .cart-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid #f9f9f9;
  }
  .cart-row .c-name { font-size: 14px; color: #333; }
  .cart-row .c-variant { font-size: 11px; color: #aaa; }
  .cart-row .c-right { display: flex; align-items: center; gap: 10px; }
  .btn-minus, .btn-plus {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid #ddd;
    background: #fff; font-size: 14px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; color: #666;
  }
  .btn-minus:active, .btn-plus:active { background: #f5f5f5; }

  .cart-footer {
    padding: 12px 16px 20px; border-top: 1px solid #f0f0f0;
    display: flex; gap: 10px;
  }
  .cart-footer button {
    flex: 1; border: none; border-radius: 22px; padding: 11px;
    font-size: 15px; cursor: pointer;
  }
  .btn-share { background: #ff6600; color: #fff; }
  .btn-close-cart { background: #f5f5f5; color: #666; }

  /* 选项弹窗 */
  .opt-mask {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 120; align-items: flex-end; justify-content: center;
  }
  .opt-mask.show { display: flex; }
  .opt-sheet {
    background: #fff; border-radius: 16px 16px 0 0; width: 100%;
    max-width: 480px; padding: 8px 16px 24px; animation: up 0.25s ease;
  }
  .opt-sheet h4 { text-align: center; font-size: 16px; padding: 12px 0; color: #333; }
  .opt-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 8px; border-bottom: 1px solid #f5f5f5; cursor: pointer;
  }
  .opt-row.chosen { color: #ff6600; }
  .opt-dot {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ddd;
  }
  .opt-row.chosen .opt-dot { border-color: #ff6600; background: #ff6600; box-shadow: inset 0 0 0 3px #fff; }
  .opt-confirm {
    width: 100%; margin-top: 14px; background: #ff6600; color: #fff;
    border: none; border-radius: 22px; padding: 12px; font-size: 16px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>我们的菜单</h1>
  <button class="cart-btn" onclick="openCart()">
    🛒 <span class="badge" id="topBadge">0</span>
  </button>
</div>

<div class="main">
  <!-- 左侧分类 -->
  <div class="sidebar" id="sidebar"></div>

  <!-- 右侧列表 -->
  <div class="content" id="content"></div>
</div>

<!-- 加料弹窗 -->
<div class="opt-mask" id="optMask">
  <div class="opt-sheet">
    <h4 id="optTitle"></h4>
    <div id="optList"></div>
    <button class="opt-confirm" onclick="confirmOpt()">加入</button>
  </div>
</div>

<!-- 购物车弹窗 -->
<div class="cart-mask" id="cartMask">
  <div class="cart-panel">
    <div class="cart-header">
      <h3>已点菜单</h3>
      <button class="clear-btn" onclick="clearCart()">清空</button>
    </div>
    <div class="cart-list" id="cartList"></div>
    <div class="cart-footer">
      <button class="btn-close-cart" onclick="closeCart()">继续点</button>
      <button class="btn-share" onclick="shareCart()">📨 分享给对方</button>
    </div>
  </div>
</div>

<script>
// ======== 菜单数据 ========
const categories = [
  { id: 'fish', name: '🐟 鱼', items: [
    { key: 'suan-1', name: '酸菜鱼·青花椒', desc: '鱼你一起 · 麻辣鲜香', tags: ['+青笋'], emoji: '🫧', needOpt: true },
    { key: 'suan-2', name: '酸菜鱼·草本', desc: '鱼你一起 · 清香不腻', tags: ['+青笋'], emoji: '🥬', needOpt: true },
    { key: 'shuizhu', name: '水煮鱼', desc: '小四川 · 滚油浇淋', tags: ['麻辣'], emoji: '🌶️' },
    { key: 'heiyu', name: '黑鱼三吃', desc: '一鱼三吃各有滋味', tags: [], emoji: '🐟' },
  ]},
  { id: 'lx', name: '🦞 龙虾', items: [
    { key: 'xiaolongxia', name: '小龙虾', desc: '剥壳蘸汤虾肉弹牙', tags: [], emoji: '🦞' },
  ]},
  { id: 'hotpot', name: '🍲 火锅', items: [
    { key: 'huoguo', name: '旋转小火锅', desc: '自选自涮一人一锅', tags: [], emoji: '🍲' },
  ]},
  { id: 'snack', name: '🍜 小吃', items: [
    { key: 'mian-1', name: '铁锅焖面', desc: '酱香浓郁焖得入味', tags: [], emoji: '🥘' },
    { key: 'menzi', name: '付记焖子', desc: '外焦里嫩蘸蒜汁', tags: ['付记'], emoji: '🫕' },
    { key: 'jitui', name: '炸鸡腿', desc: '外酥里嫩汁水四溢', tags: [], emoji: '🍗' },
  ]},
  { id: 'gd', name: '🥢 粤菜', items: [
    { key: 'guangdong', name: '广东菜', desc: '清淡鲜美原汁原味', tags: [], emoji: '🥢' },
  ]},
  { id: 'mxw', name: '🔥 毛血旺', items: [
    { key: 'xue-1', name: '毛血旺', desc: '鸭血嫩滑毛肚爽脆', tags: ['重辣'], emoji: '🩸' },
  ]},
  { id: 'dessert', name: '🍧 甜品', items: [
    { key: 'baobing', name: '刨冰', desc: '冰爽透心凉', tags: [], emoji: '🍧' },
  ]},
];

let cart = {};
let pendingKey = null;

// ======== 渲染 ========
function buildSidebar() {
  const el = document.getElementById('sidebar');
  el.innerHTML = categories.map((c, i) =>
    `<div class="cat ${i===0?'active':''}" data-id="${c.id}" onclick="scrollToCat('${c.id}', this)">${c.name}</div>`
  ).join('');
}

function buildContent() {
  const el = document.getElementById('content');
  el.innerHTML = categories.map(c => `
    <div class="section" id="sec-${c.id}">
      <div class="section-title">${c.name}</div>
      ${c.items.map(item => renderDish(item)).join('')}
    </div>
  `).join('');
}

function renderDish(item) {
  const count = cart[item.key] || 0;
  const sel = count > 0 ? ' selected' : '';
  const added = count > 0 ? ' added' : '';
  const needOpt = item.needOpt ? ' data-opt="1"' : '';
  return `
    <div class="dish-item${sel}" data-key="${item.key}"${needOpt} onclick="clickDish('${item.key}', this)">
      <div class="dish-img">${item.emoji}</div>
      <div class="dish-info">
        <div class="name">${item.name}</div>
        <div class="desc">${item.desc}</div>
        ${item.tags.length ? `<div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
      </div>
      <div class="dish-action">
        <div class="btn-add${added}">${count > 0 ? `<span class="count-num">${count}</span>` : '+'}</div>
      </div>
    </div>`;
}

function updateAll() {
  // 更新所有菜品显示
  document.querySelectorAll('.dish-item').forEach(el => {
    const key = el.dataset.key;
    const count = cart[key] || 0;
    el.classList.toggle('selected', count > 0);
    const btn = el.querySelector('.btn-add');
    btn.classList.toggle('added', count > 0);
    btn.innerHTML = count > 0 ? `<span class="count-num">${count}</span>` : '+';
  });
  updateBadge();
}

function updateBadge() {
  const total = Object.values(cart).reduce((s, v) => s + v, 0);
  document.getElementById('topBadge').textContent = total;
}

// ======== 交互 ========
function clickDish(key, el) {
  const item = findItem(key);
  if (item && item.needOpt && !cart[key]) {
    showOpt(key);
  } else {
    toggleItem(key);
  }
}

function toggleItem(key) {
  if (cart[key]) {
    delete cart[key];
  } else {
    cart[key] = 1;
  }
  updateAll();
}

function findItem(key) {
  for (const c of categories) {
    for (const item of c.items) {
      if (item.key === key) return item;
    }
  }
  return null;
}

// ======== 加料弹窗 ========
function showOpt(key) {
  pendingKey = key;
  const item = findItem(key);
  document.getElementById('optTitle').textContent = item.name + ' · 加料';
  document.getElementById('optList').innerHTML = `
    <div class="opt-row chosen" onclick="selectOpt(this, '含青笋')">
      <span>🎋 加青笋</span><div class="opt-dot"></div>
    </div>
    <div class="opt-row" onclick="selectOpt(this, '不加')">
      <span>🐟 不加</span><div class="opt-dot"></div>
    </div>
  `;
  document.getElementById('optMask').classList.add('show');
}

function selectOpt(el, variant) {
  document.querySelectorAll('#optList .opt-row').forEach(r => r.classList.remove('chosen'));
  el.classList.add('chosen');
  el._variant = variant;
}

function confirmOpt() {
  const chosen = document.querySelector('#optList .opt-row.chosen');
  const variant = chosen ? (chosen._variant || '含青笋') : '含青笋';
  cart[pendingKey] = { count: 1, variant };
  pendingKey = null;
  document.getElementById('optMask').classList.remove('show');
  updateAll();
}

// ======== 分类联动 ========
function scrollToCat(id, el) {
  document.getElementById('sec-' + id).scrollIntoView({ behavior: 'smooth' });
  document.querySelectorAll('.sidebar .cat').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

// 滚动时自动高亮分类
document.addEventListener('DOMContentLoaded', () => {
  const content = document.getElementById('content');
  content.addEventListener('scroll', () => {
    const sections = document.querySelectorAll('.section');
    const cats = document.querySelectorAll('.sidebar .cat');
    let current = sections[0]?.id;
    sections.forEach(sec => {
      const rect = sec.getBoundingClientRect();
      if (rect.top <= 100) current = sec.id;
    });
    cats.forEach(c => c.classList.toggle('active', c.dataset.id === current?.replace('sec-', '')));
  });
});

// ======== 购物车 ========
function openCart() { renderCart(); document.getElementById('cartMask').classList.add('show'); }
function closeCart() { document.getElementById('cartMask').classList.remove('show'); }
function clearCart() { cart = {}; updateAll(); closeCart(); }

function renderCart() {
  const list = document.getElementById('cartList');
  const entries = [];
  for (const [key, val] of Object.entries(cart)) {
    const item = findItem(key);
    if (!item) continue;
    const count = typeof val === 'object' ? val.count : val;
    const variant = typeof val === 'object' ? val.variant : '';
    entries.push({ key, item, count, variant });
  }
  if (!entries.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#ccc;">还没点菜</div>';
    return;
  }
  list.innerHTML = entries.map(e => `
    <div class="cart-row">
      <div>
        <div class="c-name">${e.item.emoji} ${e.item.name}${e.variant ? ' · '+e.variant : ''}</div>
        <div class="c-variant">${e.item.desc}</div>
      </div>
      <div class="c-right">
        <button class="btn-minus" onclick="changeCount('${e.key}', -1)">−</button>
        <span style="min-width:20px;text-align:center;">${e.count}</span>
        <button class="btn-plus" onclick="changeCount('${e.key}', 1)">+</button>
      </div>
    </div>
  `).join('');
}

function changeCount(key, delta) {
  const val = cart[key];
  const count = typeof val === 'object' ? val.count : val;
  const newCount = count + delta;
  if (newCount <= 0) {
    delete cart[key];
  } else if (typeof val === 'object') {
    cart[key] = { ...val, count: newCount };
  } else {
    cart[key] = newCount;
  }
  updateAll();
  renderCart();
}

function shareCart() {
  const entries = [];
  for (const [key, val] of Object.entries(cart)) {
    const item = findItem(key);
    if (!item) continue;
    const count = typeof val === 'object' ? val.count : val;
    const variant = typeof val === 'object' ? val.variant : '';
    entries.push({ key, item, count, variant });
  }
  if (!entries.length) return;

  const data = entries.map(e => `${e.key}:${e.count}:${encodeURIComponent(e.variant)}`).join(',');
  const hash = btoa(unescape(encodeURIComponent(data)));
  const shareUrl = location.origin + location.pathname + '#order=' + hash;

  const lines = entries.map(e => `${e.item.emoji} ${e.item.name}${e.variant?' · '+e.variant:''} ×${e.count}`);
  const text = `🍽️ 点了：\n${lines.join('\n')}\n\n🔗 ${shareUrl}`;
  navigator.clipboard?.writeText(text);
  alert('已复制，去微信粘贴发给对方吧');
}

// 加载分享订单
(function loadOrder() {
  const hash = location.hash;
  if (!hash.startsWith('#order=')) return;
  try {
    const data = decodeURIComponent(escape(atob(hash.replace('#order=', ''))));
    cart = {};
    data.split(',').forEach(pair => {
      const [key, countStr, variantEnc] = pair.split(':');
      const count = parseInt(countStr) || 1;
      const variant = variantEnc ? decodeURIComponent(variantEnc) : '';
      if (variant) {
        cart[key] = { count, variant };
      } else {
        cart[key] = count;
      }
    });
    history.replaceState(null, '', location.pathname);
    alert('收到菜单！看看想吃啥～');
  } catch(e) {}
})();

// 初始化
buildSidebar();
buildContent();
updateBadge();

// 弹窗外部点击关闭
document.getElementById('optMask').addEventListener('click', function(e) { if (e.target===this) { this.classList.remove('show'); pendingKey=null; }});
document.getElementById('cartMask').addEventListener('click', function(e) { if (e.target===this) closeCart(); });
</script>
</body>
</html>
